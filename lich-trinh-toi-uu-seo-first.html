<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0F1923;
  --bg2:#111827;
  --card:#1A2332;
  --card2:#1F2937;
  --border:rgba(255,255,255,.07);
  --border2:rgba(255,255,255,.12);
  --border3:rgba(255,255,255,.18);
  --text:#F9FAFB;
  --text2:#9CA3AF;
  --text3:#6B7280;
  --accent:#10B981;
  --accent2:#34D399;
  --accent-dim:rgba(16,185,129,.15);
  --accent-glow:rgba(16,185,129,.25);
  --row-hover:rgba(255,255,255,.025);
  --drag-bg:rgba(255,255,255,.05);
  --font:'DM Sans',sans-serif;
  --mono:'DM Mono',monospace;
  --r:10px;--rlg:14px;
}
html{min-height:100%;background:linear-gradient(165deg,#0B1422 0%,#0F1A2E 50%,#0C1727 100%);background-attachment:fixed}
html::before,html::after{content:'';position:fixed;inset:-25%;z-index:-1;pointer-events:none;will-change:transform,opacity;filter:blur(8px)}
html::before{
  background:
    radial-gradient(38% 42% at 22% 24%, rgba(52,211,153,.22), transparent 70%),
    radial-gradient(42% 46% at 80% 30%, rgba(129,140,248,.20), transparent 72%);
  animation:auroraA 26s ease-in-out infinite}
html::after{
  background:
    radial-gradient(40% 44% at 28% 82%, rgba(96,165,250,.18), transparent 72%),
    radial-gradient(40% 46% at 78% 76%, rgba(244,160,190,.16), transparent 72%);
  animation:auroraB 33s ease-in-out infinite}
@keyframes auroraA{0%{transform:translate3d(0,0,0) scale(1);opacity:.9}50%{transform:translate3d(4%,3%,0) scale(1.1);opacity:1}100%{transform:translate3d(0,0,0) scale(1);opacity:.9}}
@keyframes auroraB{0%{transform:translate3d(0,0,0) scale(1.06);opacity:1}50%{transform:translate3d(-4%,-3%,0) scale(1);opacity:.85}100%{transform:translate3d(0,0,0) scale(1.06);opacity:1}}
@media(prefers-reduced-motion:reduce){html::before,html::after{animation:none}}
body{font-family:var(--font);background:transparent;color:var(--text);min-height:100vh;padding:20px 18px 60px;max-width:900px;margin:0 auto}

/* ── MODAL ── */
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.moverlay.open{opacity:1;pointer-events:all}
.modal{background:#1A2332;border:1px solid var(--border2);border-radius:16px;padding:24px 26px;width:390px;max-width:92vw;box-shadow:0 24px 60px rgba(0,0,0,.5)}
.mtitle{font-size:15px;font-weight:500;color:var(--text);margin-bottom:4px}
.msub{font-size:12px;color:var(--text2);margin-bottom:13px;line-height:1.5}
.mtask{font-size:12px;font-weight:500;color:var(--accent2);background:var(--accent-dim);border-radius:7px;padding:8px 11px;margin-bottom:12px;border:1px solid rgba(52,211,153,.15)}
.modal textarea{width:100%;border:1px solid var(--border2);border-radius:9px;padding:10px 12px;font-family:var(--font);font-size:13px;color:var(--text);background:var(--bg2);resize:none;outline:none;height:80px;transition:border-color .15s}
.modal textarea:focus{border-color:var(--accent)}
.macts{display:flex;gap:7px;margin-top:12px;justify-content:flex-end}
.mbtn{padding:8px 16px;border-radius:8px;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);transition:all .15s}
.mbtn:hover{background:var(--drag-bg);color:var(--text)}
.mbtn.ok{background:var(--accent);color:#fff;border-color:var(--accent)}.mbtn.ok:hover{background:#0EA572}
.mbtn.un{border-color:rgba(239,68,68,.4);color:#F87171}.mbtn.un:hover{background:rgba(239,68,68,.1)}

/* ── HEADER ── */
.hdr{display:flex;align-items:stretch;gap:14px;margin-bottom:14px;flex-direction:row-reverse}
.hdr-left{flex:0 0 34%;min-width:0;display:flex;flex-direction:column;justify-content:space-between;background:linear-gradient(145deg,#091A12 0%,#0D2318 45%,#111827 100%);border:1px solid rgba(16,185,129,.15);border-radius:14px;padding:16px 18px}
.hdr-title{font-size:18px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:8px;margin-bottom:3px}
.hdr-sub{font-size:11px;color:var(--text3);line-height:1.5}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);transition:background .3s;flex-shrink:0}
.sync-dot.ok{background:var(--accent)}.sync-dot.err{background:#EF4444}
.sync-dot.loading{background:#F59E0B;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.prog-track{height:3px;background:rgba(255,255,255,.06);border-radius:2px;width:100%;overflow:hidden;margin-top:10px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .4s}
.prog-lbl{font-size:11px;color:var(--text3);margin-top:5px}
.sheet-btns{display:flex;gap:6px;margin-top:10px}
.sbt{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;font-family:var(--font);font-size:11px;font-weight:500;cursor:pointer;border:1px solid;transition:all .18s}
.sbt.sy{background:var(--accent-dim);color:var(--accent2);border-color:rgba(52,211,153,.2)}.sbt.sy:hover{background:rgba(16,185,129,.22)}
.sbt:disabled{opacity:.4;cursor:not-allowed}
.sbt svg{width:12px;height:12px;flex-shrink:0}

/* ── POMODORO ── */
.pom{flex:1;background:linear-gradient(145deg,#091A12 0%,#0D2318 45%,#111827 100%);border:1px solid rgba(16,185,129,.15);border-radius:14px;padding:18px 22px;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center}
.pom-modes{display:flex;gap:5px}
.pmode{padding:5px 13px;border:1.5px solid rgba(255,255,255,.15);background:transparent;border-radius:20px;font-family:var(--font);font-size:11px;font-weight:500;color:rgba(255,255,255,.45);cursor:pointer;transition:all .18s}
.pmode.active{background:#10B981;color:#fff;border-color:#10B981}
.pmode:hover:not(.active){background:rgba(255,255,255,.07);color:rgba(255,255,255,.7)}
.pom-bigtime{font-size:50px;font-weight:300;font-family:var(--mono);color:#F9FAFB;letter-spacing:-2px;line-height:1;text-shadow:0 0 30px rgba(16,185,129,.2)}
.pom-controls{display:flex;align-items:center;gap:8px}
.pom-start-btn{padding:9px 32px;background:#10B981;color:#fff;border-radius:24px;border:none;font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;transition:all .18s;letter-spacing:.2px}
.pom-start-btn:hover{background:#0EA572}
.pom-reset-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);color:rgba(255,255,255,.6);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.pom-reset-btn:hover{background:rgba(255,255,255,.14);color:#fff}
.pom-quote{font-size:11px;color:rgba(255,255,255,.75);font-style:italic;line-height:1.4;min-height:14px;transition:opacity .4s;width:100%;text-align:center}
.pom-quote.fade{opacity:0}
.pom-mini-stats{font-size:10px;color:rgba(255,255,255,.3);margin-top:-4px}
.pom-sub{display:flex;gap:5px;margin-top:-4px}
.psub{padding:3px 12px;border:1px solid rgba(255,255,255,.12);background:transparent;border-radius:14px;font-family:var(--font);font-size:11px;font-weight:500;color:rgba(255,255,255,.4);cursor:pointer;transition:all .15s}
.psub.active{background:rgba(16,185,129,.2);color:#34D399;border-color:rgba(16,185,129,.3)}
.psub:hover:not(.active){background:rgba(255,255,255,.06);color:rgba(255,255,255,.7)}

/* ── WEEK STRIP ── */
.wstrip{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 16px;margin-bottom:12px}
.wstop{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.wstlbl{font-size:13px;font-weight:500;color:var(--text)}
.wstsub{font-size:11px;color:var(--text3)}
.wdays{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.wday{display:flex;flex-direction:column;align-items:center;gap:2px;border-radius:9px;padding:7px 2px;border:1px solid transparent;transition:all .15s}
.wday.today{background:var(--accent-dim);border-color:var(--accent-glow)}
.wday.has-data{border-color:var(--border2)}
.wdn{font-size:9px;font-weight:600;letter-spacing:.5px;color:var(--text3);text-transform:uppercase}
.wdd{font-size:14px;font-weight:500;color:var(--text);font-variant-numeric:tabular-nums;line-height:1.1}
.wds{font-size:9px;color:var(--text3)}
.wday.today .wdn,.wday.today .wdd,.wday.today .wds{color:var(--accent2)}
.wddot{width:5px;height:5px;border-radius:50%;background:transparent;margin-top:2px}
.wddot.hi{background:var(--accent)}.wddot.mi{background:#F59E0B}.wddot.lo{background:#EF4444}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:14px}
.tab{padding:10px 18px;border:none;background:transparent;font-family:var(--font);font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:all .15s}
.tab:hover{color:var(--text2)}.tab.active{color:var(--accent2);border-bottom-color:var(--accent)}

/* ── NOTICE ── */
.notice{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.18);border-radius:var(--r);padding:9px 13px;margin-bottom:12px;font-size:12px;color:var(--accent2);display:flex;align-items:flex-start;gap:7px}
.panel{display:none}.panel.active{display:block}

/* ── TOOLBAR ── */
.tbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.dchip{font-size:12px;font-weight:500;background:var(--accent-dim);color:var(--accent2);padding:4px 12px;border-radius:20px;border:1px solid rgba(52,211,153,.15)}
.lchip{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;margin-left:5px}
.lc-p{background:rgba(129,140,248,.12);color:#A5B4FC;border:1px solid rgba(129,140,248,.2)}
.lc-a{background:rgba(245,158,11,.1);color:#FCD34D;border:1px solid rgba(245,158,11,.2)}
.lc-k{background:rgba(244,114,182,.1);color:#F9A8D4;border:1px solid rgba(244,114,182,.2)}
.addbtn{display:flex;align-items:center;gap:5px;padding:6px 12px;border:1px solid var(--border2);background:transparent;border-radius:8px;font-family:var(--font);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s}
.addbtn:hover{background:var(--drag-bg);color:var(--text)}

/* ── TABLE ── */
.sched{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.colh{display:grid;grid-template-columns:26px 104px 1fr auto 42px 30px 26px;padding:7px 0;background:rgba(255,255,255,.02);border-bottom:1px solid var(--border)}
.colh span{font-size:10px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:var(--text3);padding:0 5px}
.sec-hdr{background:rgba(255,255,255,.02);padding:5px 12px 5px 26px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--accent);border-bottom:1px solid var(--border)}
.row{display:grid;grid-template-columns:26px 104px 1fr auto 42px 30px 26px;align-items:center;border-bottom:1px solid var(--border);min-height:50px;transition:background .12s;position:relative}
.row:last-child{border-bottom:none}
.row:hover{background:var(--row-hover)}
.row.done-row{opacity:.4}
.row.skip-row{background:rgba(245,158,11,.04)}
.row.hl-row{background:rgba(16,185,129,.05)}.row.hl-row:hover{background:rgba(16,185,129,.08)}
.row.dragging{opacity:.35;background:var(--drag-bg)}
.row.drag-over{background:rgba(16,185,129,.08);border-top:2px solid var(--accent)}
.dh{display:flex;align-items:center;justify-content:center;cursor:grab;color:var(--text3);padding:0 4px;height:100%;touch-action:none;opacity:.4}
.dh:active{cursor:grabbing}
.dhd{display:grid;grid-template-columns:1fr 1fr;gap:2.5px;width:10px}
.dhd span{width:2.5px;height:2.5px;background:currentColor;border-radius:50%}
.tcell{padding:0 6px 0 2px;font-family:var(--mono);font-size:11px;color:var(--text3);cursor:text}
.tinp{font-family:var(--mono);font-size:11px;color:var(--text);background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:3px 6px;width:94px;outline:none}
.tinp:focus{border-color:var(--accent)}
.taskcell{padding:7px 6px;display:flex;align-items:flex-start;gap:7px}
.cdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;cursor:pointer;transition:transform .15s;margin-top:4px}
.cdot:hover{transform:scale(1.4)}
.ttxt{font-size:13px;color:var(--text);flex:1;cursor:text;line-height:1.45}
.tinpt{font-family:var(--font);font-size:13px;color:var(--text);background:transparent;border:none;outline:none;width:100%;line-height:1.45}
.skip-badge{font-size:10px;color:#FCD34D;background:rgba(245,158,11,.1);padding:1px 7px;border-radius:8px;margin-top:3px;display:inline-block;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border:1px solid rgba(245,158,11,.15)}
.tagcell{padding:0 5px}
.tag{font-size:10px;font-weight:500;padding:3px 8px;border-radius:20px;white-space:nowrap;cursor:pointer;display:block;opacity:.85}
.tag:hover{opacity:1}
.chkcell{display:flex;align-items:center;justify-content:center}
.cbw{position:relative;width:22px;height:22px;cursor:pointer}
.cbw input{position:absolute;opacity:0;width:0;height:0}
.cbb{width:22px;height:22px;border:1.5px solid var(--border2);border-radius:6px;background:transparent;display:flex;align-items:center;justify-content:center;transition:all .18s}
.cbw input:checked ~ .cbb{background:var(--accent);border-color:var(--accent)}
.cbch{opacity:0;transition:opacity .15s}
.cbw input:checked ~ .cbb .cbch{opacity:1}
.cbch svg{width:13px;height:13px;stroke:#fff;stroke-width:2.5;fill:none;display:block}
.skipcell{display:flex;align-items:center;justify-content:center}
.skipbtn{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.skipbtn:hover,.skipbtn.on{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.3);color:#F59E0B}
.delcell{display:flex;align-items:center;justify-content:center;padding-right:3px}
.delbtn{width:20px;height:20px;border-radius:50%;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s;opacity:0;line-height:1}
.row:hover .delbtn{opacity:1}.delbtn:hover{background:rgba(239,68,68,.15);color:#F87171}
.cpick{position:absolute;z-index:200;background:#1A2332;border:1px solid var(--border2);border-radius:11px;padding:9px;box-shadow:0 12px 40px rgba(0,0,0,.5);display:none;flex-wrap:wrap;gap:7px;width:146px;top:50%;left:34px;transform:translateY(-50%)}
.cpick.open{display:flex}
.cpdot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .12s}
.cpdot:hover{transform:scale(1.18)}.cpdot.sel{border-color:var(--text)}

/* ── DAY NOTE ── */
.dnwrap{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-top:12px}
.dnlbl{font-size:10px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.dnrow{display:flex;gap:7px}
.dninp{flex:1;border:1px solid var(--border2);border-radius:8px;padding:8px 12px;font-family:var(--font);font-size:13px;color:var(--text);background:var(--bg2);outline:none;transition:border-color .15s}
.dninp:focus{border-color:var(--accent)}
.dninp::placeholder{color:var(--text3)}
.dnbtn{padding:8px 14px;border:1px solid var(--border2);background:transparent;border-radius:8px;font-family:var(--font);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap}
.dnbtn:hover{background:var(--drag-bg);color:var(--text)}

/* ── TRACKING ── */
.trkstats{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:16px}
.trkstat{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 12px;text-align:center}
.trkval{font-size:22px;font-weight:500;color:var(--text);line-height:1}
.trklab{font-size:11px;color:var(--text3);margin-top:3px}
.trksec{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);margin:0 0 9px}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:16px}
.calh{font-size:10px;font-weight:600;text-align:center;color:var(--text3);padding:3px 0}
.cald{min-height:58px;border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;position:relative;border:1px solid transparent;transition:border-color .1s;padding:4px 2px}
.calpct{font-size:9px;font-weight:500;line-height:1;text-align:center}
.cald.has{border-color:var(--border2);cursor:pointer}.cald.td{border-color:var(--accent)!important;background:var(--accent-dim)}
.cald.has:hover .caltip{display:block}
.calnum{font-size:10px;color:var(--text3);line-height:1;font-variant-numeric:tabular-nums}
.cald.td .calnum{color:var(--accent2)}
.calbar{width:65%;height:4px;border-radius:2px;background:var(--border)}
.caltip{display:none;position:absolute;bottom:calc(100%+5px);left:50%;transform:translateX(-50%);background:#1A2332;border:1px solid var(--border2);color:var(--text);font-size:11px;padding:5px 9px;border-radius:6px;white-space:nowrap;z-index:50;pointer-events:none}
.trklist{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.trkrow{display:grid;grid-template-columns:100px 1fr 52px 76px;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border);font-size:12px;gap:8px}
.trkrow:last-child{border-bottom:none}
.trkrow.trkh{background:rgba(255,255,255,.02);font-size:10px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:var(--text3);padding:7px 14px}
.trkdate{color:var(--text2);font-variant-numeric:tabular-nums}
.trkpw{background:rgba(255,255,255,.06);border-radius:3px;height:5px;overflow:hidden}
.trkpf{height:100%;border-radius:3px}
.trkpn{color:var(--text);font-weight:500;text-align:right}
.trkst{font-size:10px;padding:2px 7px;border-radius:10px;text-align:center;white-space:nowrap}
.sg{background:rgba(16,185,129,.15);color:#34D399}.sd{background:rgba(52,211,153,.1);color:#6EE7B7}
.so{background:rgba(245,158,11,.1);color:#FCD34D}.sl{background:rgba(239,68,68,.1);color:#FCA5A5}
.sn{background:rgba(255,255,255,.05);color:var(--text3)}
.trkbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.expbtn{display:flex;align-items:center;gap:4px;padding:6px 12px;border:1px solid var(--border2);background:transparent;border-radius:8px;font-family:var(--font);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s}
.expbtn:hover{background:var(--drag-bg);color:var(--text)}

/* ── JIM ROHN ── */
.jimintro{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:14px}
.jimq{font-size:15px;font-weight:500;color:var(--accent2);line-height:1.55;margin-bottom:5px}
.jims{font-size:12px;color:var(--text3)}
.jimgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:560px){.jimgrid{grid-template-columns:1fr}}
.jimc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;border-left:3px solid}
.jimn{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.jimv{font-size:13px;font-weight:500;color:var(--text);line-height:1.45;margin-bottom:5px}
.jime{font-size:11px;color:var(--text3);font-style:italic;margin-bottom:7px;line-height:1.4}

const NOW=new Date();
function dstr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
const TODAY=dstr(NOW);
const DOW=NOW.getDay();
const VDL=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
function getTodaySch(){if(DOW===1||DOW===3)return{key:'t24',sch:SCHEDULES.t24};if(DOW===2||DOW===5)return{key:'t36',sch:SCHEDULES.t36};if(DOW===4)return{key:'thu',sch:SCHEDULES.thu};return{key:'weekend',sch:SCHEDULES.weekend};}
const{key:TK,sch:TSCH}=getTodaySch();
document.getElementById('tab-today').textContent='📋 Today';

let idCnt=200,dragSrc=null;
const CKK='ck_'+TODAY,SKK='sk_'+TODAY;
function ldCk(){try{return JSON.parse(localStorage.getItem(CKK)||'{}')}catch{return{}}}
function svCk(o){try{localStorage.setItem(CKK,JSON.stringify(o))}catch{}}
function ldSk(){try{return JSON.parse(localStorage.getItem(SKK)||'{}')}catch{return{}}}
function svSk(o){try{localStorage.setItem(SKK,JSON.stringify(o))}catch{}}
let CK=ldCk(),SK=ldSk();

function getColor(id){return COLORS.find(c=>c.id===id)||COLORS[6];}

function sdot(s){const d=document.getElementById('sdot');d.className='sync-dot '+s;}

function updateProg(){
  const rows=TSCH.rows;const done=rows.filter(r=>CK[r.id]).length;
  const pct=rows.length?Math.round(done/rows.length*100):0;
  document.getElementById('plbl').textContent=done+' / '+rows.length+' task hôm nay ('+pct+'%)';
  const circ=188.5;
  const ring=document.getElementById('prog-ring');
  const lbl=document.getElementById('prog-pct');
  if(ring)ring.style.strokeDashoffset=circ*(1-pct/100);
  if(lbl)lbl.textContent=pct+'%';
  const color=pct>=80?'#10B981':pct>=50?'#34D399':pct>=25?'#F59E0B':'#6B7280';
  if(ring)ring.style.stroke=color;
}

async function logTask(row,status,reason=''){
  sdot('loading');const c=getColor(row.color);
  try{await fetch(AS_URL,{method:'POST',mode:'no-cors',body:JSON.stringify({action:'log_task',date:TODAY,task_id:String(row.id),task_name:row.task,category:c.label,tab_group:TK,scheduled_time:row.time,status,skip_reason:reason,pw:AUTH_PW})});sdot('ok');}
  catch(e){sdot('err');}
}

function catColor(cat){const c=COLORS.find(x=>x.label===cat);return c?c.id:'gray';}
function applySheetTasks(tasks,reset){
  if(reset){CK={};SK={};TSCH.rows=TSCH.rows.filter(r=>!r.custom);}
  (tasks||[]).forEach(t=>{
    const id=parseInt(t.task_id);
    if(!TSCH.rows.some(r=>r.id===id)){
      TSCH.rows.push({id:id,time:t.scheduled_time||'',task:t.task_name||'(task)',color:catColor(t.category),section:'Tự thêm',custom:true});
      if(id>=idCnt)idCnt=id;
    }
    if(t.status==='done'){CK[id]=true;delete SK[id];}
    else if(t.status==='skip'){SK[id]=t.skip_reason||'';delete CK[id];}
    else{delete CK[id];delete SK[id];}
  });
  svCk(CK);svSk(SK);renderToday();updateProg();renderWeekStrip();
}

function makeRow(row){

    <div class="dh"><div class="dhd"><span></span><span></span><span></span><span></span><span></span><span></span></div></div>
    <div class="tcell" id="tc-${row.id}" onclick="editTime(${row.id})">${row.time}</div>
    <div class="taskcell">
      <div class="cdot" style="background:${c.dot}" onclick="openCP(event,${row.id})"></div>
      <div style="flex:1">
        <span class="ttxt" id="tt-${row.id}" onclick="editTask(${row.id})">${row.task}</span>
        ${isSkip?`<div><span class="skip-badge" title="${SK[row.id]||''}">⚠ ${SK[row.id]||'Skipped'}</span></div>`:''}
      </div>
    </div>

    <div class="delcell"><button class="delbtn" onclick="deleteRow(${row.id})">×</button></div>
    <div class="cpick" id="cp-${row.id}"></div>`;
  const cp=r.querySelector('.cpick');
  COLORS.forEach(col=>{const d=document.createElement('div');d.className='cpdot'+(col.id===row.color?' sel':'');d.style.background=col.dot;d.title=col.label;d.onclick=e=>{e.stopPropagation();row.color=col.id;cp.classList.remove('open');renderToday();};cp.appendChild(d);});
  r.addEventListener('dragstart',e=>{dragSrc=r;r.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
  r.addEventListener('dragend',()=>{r.classList.remove('dragging');document.querySelectorAll('.row').forEach(x=>x.classList.remove('drag-over'));});
  r.addEventListener('dragover',e=>{e.preventDefault();if(dragSrc&&dragSrc!==r){document.querySelectorAll('.row').forEach(x=>x.classList.remove('drag-over'));r.classList.add('drag-over');}});
  r.addEventListener('drop',e=>{
    e.preventDefault();
    if(dragSrc&&dragSrc!==r){
      const tbl=document.getElementById('today-tbl'),all=[...tbl.querySelectorAll('.row')];
      const si=all.indexOf(dragSrc),ti=all.indexOf(r);
      if(si<ti)tbl.insertBefore(dragSrc,r.nextSibling);else tbl.insertBefore(dragSrc,r);
      const rws=TSCH.rows,sI=rws.findIndex(x=>x.id===parseInt(dragSrc.dataset.id)),tI=rws.findIndex(x=>x.id===parseInt(r.dataset.id));
      const[mv]=rws.splice(sI,1);rws.splice(sI<tI?tI-1:tI,0,mv);
    }
    document.querySelectorAll('.row').forEach(x=>x.classList.remove('drag-over'));
  });
  return r;
}

function renderIdeaAlerts(){

    if(x.status!=='pending'||!x.deadline)return false;
    const diff=Math.ceil((new Date(x.deadline)-today)/(1000*60*60*24));
    return diff<=7;
  });
  if(!urgent.length){container.innerHTML='';return;}
  container.innerHTML=urgent.map(x=>{
    const diff=Math.ceil((new Date(x.deadline)-today)/(1000*60*60*24));
    const c=getColor(x.color);
    const urgentCls=diff<=2?'idea-alert-urgent':'';
    const label=diff<0?'Overdue '+Math.abs(diff)+'d':diff===0?'Today':diff+'d left';
    return`<div class="idea-alert-card">
      <div class="idea-alert-dot" style="background:${c.dot}"></div>
      <span class="idea-alert-name">${x.text}</span>
      <span class="idea-alert-dead ${urgentCls}">⏰ ${label} — ${x.deadline}</span>

      deadBadge=`<span class="idea-date-badge" style="background:${bc};color:${tc};border-color:${tc}40">⏰ ${lbl}</span>`;
    }
    const actionBtns=x.status==='pending'
      ?`<button class="iabtn done" onclick="markIdeaDone(${x.id})">✓ Done</button><button class="iabtn skip" onclick="openIdeaSkip(${x.id})">✕ Skip</button>`
      :`<button class="iabtn" onclick="undoIdeaStatus(${x.id})">↩ Restore</button>`;
    const skipNote=x.status==='skip'&&x.skip_reason?`<div class="idea-skip-reason">Reason: ${x.skip_reason}</div>`:'';
    const datePicker=x.status==='pending'
      ?`<div style="display:flex;align-items:center;gap:6px;margin-top:7px">
          <span style="font-size:10px;color:var(--text3)">Complete by:</span>
          <input type="date" class="idea-date-inp" style="width:140px;font-size:11px;padding:3px 8px" value="${x.deadline||''}" onchange="setIdeaDeadline(${x.id},this.value)">
          ${deadBadge}
        </div>`:'';
    return`<div class="idea-card ${x.status==='done'?'done-idea':x.status==='skip'?'skip-idea':''}" id="icard-${x.id}">
      <div class="idea-cdot" style="background:${c.dot}"></div>
      <div class="idea-body">
        <div class="idea-name ${x.status==='done'?'done-txt':''}" id="iname-${x.id}" onclick="editIdeaName(${x.id})">${x.text}</div>
        <div class="idea-meta"><span class="idea-added-lbl">Added ${x.date_added}</span></div>
        ${datePicker}${skipNote}
      </div>
      <div class="idea-actions">
        ${actionBtns}
        <button class="iabtn" onclick="editIdeaName(${x.id})" title="Edit">✏️</button>
        <button class="iabtn" onclick="deleteIdea(${x.id})" title="Delete" style="border-color:rgba(239,68,68,.2);color:#F87171">🗑</button>
      </div>
    </div>`;
  }).join(''):'<div class="ideas-empty">No ideas in this view.</div>';

  panel.innerHTML=addHtml+filterHtml+'<div class="ideas-wrap">'+cardsHtml+'</div>';

  // wire up color picker 2
  document.addEventListener('click',e=>{
    const m=document.getElementById('idea-cpick-menu2');
    if(m&&!m.contains(e.target)&&e.target.id!=='idea-color-btn2')m.classList.remove('open');
  },{once:true});
}

// ── POMODORO ──
let ps=25*60,pt=25*60,pr=false,ptimer=null,pd=false,pSessions=0,pMinutes=0;
function setPomMain(btn){
  if(pr)return;
  document.querySelectorAll('.pmode').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('pom-sub').style.display='flex';
  const activeMin=document.querySelector('.psub.active');
  const min=activeMin&&activeMin.id==='psub45'?45:25;
  ps=pt=min*60;pd=false;pomUI();
}
function hideSub(){
  document.getElementById('pom-sub').style.display='none';
}
function setPomMode(min,btn){
  if(pr)return;ps=pt=min*60;pd=false;
  if(btn.classList.contains('psub')){
    document.querySelectorAll('.psub').forEach(b=>b.classList.remove('active'));
  } else {
    document.querySelectorAll('.pmode').forEach(b=>b.classList.remove('active'));
  }
  btn.classList.add('active');pomUI();
}
function togglePom(){
  if(pd){resetPom();return;}
  pr=!pr;
  if(pr){ptimer=setInterval(()=>{ps--;if(ps<=0){clearInterval(ptimer);pr=false;pd=true;ps=0;pSessions++;pMinutes+=Math.round(pt/60);document.getElementById('pom-sessions-done').textContent=pSessions;document.getElementById('pom-minutes-done').textContent=pMinutes;playDing();}pomUI();},1000);}
  else{clearInterval(ptimer);}pomUI();
}
function resetPom(){clearInterval(ptimer);pr=false;pd=false;ps=pt;pomUI();}
const POM_QUOTES=[
  '"Success is nothing more than a few simple disciplines, practiced every day."',
  '"Motivation is what gets you started. Habit is what keeps you going."',
  '"Don\'t wish it was easier; wish you were better."',
  '"Either you run the day, or the day runs you."',
  '"We must all suffer one of two things: the pain of discipline or the pain of regret."',
  '"Formal education will make you a living; self-education will make you a fortune."',
  '"Work harder on yourself than you do on your job."',
  '"You are the average of the five people you spend the most time with."',
  '"Don\'t join an easy crowd; you won\'t grow."',
];
let _quoteIdx=Math.floor(Math.random()*POM_QUOTES.length);
function initQuote(){
  const el=document.getElementById('pom-quote');
  if(el)el.textContent=POM_QUOTES[_quoteIdx];
  setInterval(()=>{
    const el=document.getElementById('pom-quote');if(!el)return;
    el.classList.add('fade');
    setTimeout(()=>{_quoteIdx=(_quoteIdx+1)%POM_QUOTES.length;el.textContent=POM_QUOTES[_quoteIdx];el.classList.remove('fade');},400);
  },60000);
}

function pomUI(){
  const m=String(Math.floor(ps/60)).padStart(2,'0'),s=String(ps%60).padStart(2,'0');
  document.getElementById('ptime').textContent=`${m}:${s}`;
  const btn=document.getElementById('pstart');
  if(btn)btn.textContent=pd?'↺ lại':pr?'⏸ pause':'▶ start';
}
function playDing(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();[880,1100,880].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.value=f;const t=ctx.currentTime+i*.22;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.35,t+.04);g.gain.exponentialRampToValueAtTime(.001,t+.55);o.start(t);o.stop(t+.6);});}catch(e){}}

// ── WEEK STRIP ──
function wkno(d){const dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));dt.setUTCDate(dt.getUTCDate()+4-(dt.getUTCDay()||7));const ys=new Date(Date.UTC(dt.getUTCFullYear(),0,1));return Math.ceil((((dt-ys)/86400000)+1)/7);}
function ldck(ds){try{return JSON.parse(localStorage.getItem('ck_'+ds)||'{}')}catch{return{};}}

function renderWeekStrip(){
  const d=NOW.getDay(),mon=new Date(NOW);mon.setDate(NOW.getDate()-((d+6)%7));
  const wdays=Array.from({length:7},(_,i)=>{const x=new Date(mon);x.setDate(mon.getDate()+i);return x;});
  const strip=document.getElementById('wstrip');
  strip.innerHTML=`<div class="wstop"><div class="wstlbl">📅 ${VDL[DOW]}, ${NOW.getDate()}/${String(NOW.getMonth()+1).padStart(2,'0')}/${NOW.getFullYear()}</div><div class="wstsub">Week ${wkno(NOW)}</div></div><div class="wdays" id="wdg"></div>`;
  const tot=TSCH.rows.length,g=strip.querySelector('#wdg');
  const dn=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  wdays.forEach((day,i)=>{
    const ds=dstr(day),isToday=ds===TODAY;let pct=0;if(ds===TODAY){pct=todaySnapshot().pct;}else if(DAILY[ds]){pct=parseInt(DAILY[ds].pct)||0;}const done=pct>0?1:0;
    const dc=pct>=70?'hi':pct>=40?'mi':pct>0?'lo':'';
    const cell=document.createElement('div');
    cell.className='wday'+(isToday?' today':done>0?' has-data':'');
    cell.innerHTML=`<span class="wdn">${dn[i]}</span><span class="wdd">${day.getDate()}</span><span class="wds">${day.getMonth()+1}/${String(day.getFullYear()).slice(2)}</span><div class="wddot ${dc}"></div>`;
    g.appendChild(cell);
  });
}

// ── TRACKING ──
const TTOT=TSCH.rows.length;
function pc(p){return p>=80?'#10B981':p>=60?'#34D399':p>=40?'#F59E0B':'#EF4444';}
function pst(p){if(!p)return '<span class="trkst sn">None</span>';if(p>=80)return '<span class="trkst sg">Excellent</span>';if(p>=60)return '<span class="trkst sd">Good</span>';if(p>=40)return '<span class="trkst so">Medium</span>';return '<span class="trkst sl">Low</span>';}
function ratingShort(p){return p>=80?'Exc':p>=60?'Good':p>=40?'Med':'Low';}
function todaySnapshot(){
  const total=TSCH.rows.length;let done=0,skipped=0;
  TSCH.rows.forEach(r=>{if(CK[r.id])done++;else if(r.id in SK)skipped++;});
  return{total,done,skipped,pct:total?Math.round(done/total*100):0};
}
async function pushProgress(){
  const s=todaySnapshot();
  DAILY[TODAY]={pct:s.pct,done:s.done,total:s.total};
  try{await fetch(AS_URL,{method:'POST',mode:'no-cors',body:JSON.stringify({action:'log_progress',pw:AUTH_PW,date:TODAY,tasks_total:s.total,tasks_done:s.done,tasks_skipped:s.skipped,pct:s.pct})});}catch(e){}
}
async function loadDaily(){
  try{
    const res=await fetch(AS_URL+'?action=get_daily&pw='+encodeURIComponent(AUTH_PW));
    const data=await res.json();
    if(data.success&&data.days){
      DAILY={};
      data.days.forEach(d=>{if(d.date)DAILY[d.date]={pct:parseInt(String(d.pct_complete!=null&&d.pct_complete!==''?d.pct_complete:0))||0,done:Number(d.tasks_done)||0,total:Number(d.tasks_total)||0};});
      if(document.getElementById('panel-track').classList.contains('active'))renderTracking();
    }
  }catch(e){}
}
function hist28(){
  const today=new Date();
  return Array.from({length:28},(_,i)=>{
    const d=new Date(today);d.setDate(today.getDate()-(27-i));
    const ds=dstr(d);let pct=0,done=0,total=0;
    if(ds===TODAY){const s=todaySnapshot();pct=s.pct;done=s.done;total=s.total;}
    else if(DAILY[ds]){pct=parseInt(DAILY[ds].pct)||0;done=DAILY[ds].done||0;total=DAILY[ds].total||0;}
    return{date:d,ds,done,pct,total,isToday:i===27};
  });
}
function renderTracking(){
  const h=hist28(),td=h[27];
  let streak=0;for(let i=26;i>=0;i--){if(h[i].pct>0)streak++;else break;}
  const act=h.filter(x=>x.pct>0),avg=act.length?Math.round(act.reduce((s,x)=>s+x.pct,0)/act.length):0;
  const p=document.getElementById('panel-track');
  p.innerHTML=`<div class="trkstats">
    <div class="trkstat"><div class="trkval" style="color:#10B981">${td.pct}%</div><div class="trklab">Today</div></div>
    <div class="trkstat"><div class="trkval" style="color:#F59E0B">${streak}</div><div class="trklab">🔥 Streak</div></div>
    <div class="trkstat"><div class="trkval">${avg}%</div><div class="trklab">Average</div></div>
    <div class="trkstat"><div class="trkval">${act.length}</div><div class="trklab">Days tracked</div></div>
  </div>
  <div class="trksec">Last 4 weeks</div>
  <div class="calgrid" id="cg"></div>
  <div class="trkbar"><div class="trksec" style="margin:0">Daily history</div>
    <button class="expbtn" onclick="exportCSV()">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6.5 9V1M3.5 6.5l3 3 3-3"/><path d="M1 10v1.5a.5.5 0 0 0 .5.5h11a.5.5 0 0 0 .5-.5V10"/></svg>
      Export CSV
    </button>
  </div>
  <div class="trklist"><div class="trkrow trkh"><span>Date</span><span>Progress</span><span style="text-align:right">%</span><span style="text-align:center">Rating</span></div><div id="trk-body"></div></div>`;
  const dw=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],cg=p.querySelector('#cg');
  dw.forEach(x=>{const el=document.createElement('div');el.className='calh';el.textContent=x;cg.appendChild(el);});
  const fd=h[0].date.getDay();for(let i=0;i<fd;i++)cg.appendChild(document.createElement('div'));
  h.forEach(day=>{
    const c=document.createElement('div');c.className='cald'+(day.pct>0?' has':'')+(day.isToday?' td':'');
    const bc=day.pct>0?pc(day.pct):undefined;
    c.innerHTML=`<span class="calnum">${day.date.getDate()}</span><div class="calbar" style="${bc?`background:${bc};width:${day.pct}%`:''}"></div>${day.pct>0?`<span class="calpct" style="color:${bc}">${ratingShort(day.pct)} ${day.pct}%</span>`:''}${day.pct>0?`<div class="caltip">${VDL[day.date.getDay()]} ${day.date.getDate()}/${day.date.getMonth()+1} — ${day.done}/${day.total||0} (${day.pct}%)</div>`:''}`;
    cg.appendChild(c);
  });
  const body=p.querySelector('#trk-body');
  [...h].reverse().forEach(day=>{if(!day.pct&&!day.isToday)return;const r=document.createElement('div');r.className='trkrow';r.innerHTML=`<span class="trkdate">${VDL[day.date.getDay()]} ${day.date.getDate()}/${day.date.getMonth()+1}${day.isToday?' <b>(today)</b>':''}</span><div><div class="trkpw"><div class="trkpf" style="width:${day.pct}%;background:${pc(day.pct)}"></div></div></div><span class="trkpn">${day.pct}%</span>${pst(day.pct)}`;body.appendChild(r);});
  if(!body.children.length)body.innerHTML='<div style="padding:24px;text-align:center;color:var(--text3);font-size:13px">Tick a checkbox to start tracking.</div>';
}
function exportCSV(){const rows=[['Date','Day','Done','Total','%']];hist28().filter(d=>d.done>0||d.isToday).forEach(d=>rows.push([d.ds,VDL[d.date.getDay()],d.done,d.total||0,d.pct]));const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(rows.map(r=>r.join(',')).join('\n'));a.download='tracking-'+TODAY+'.csv';a.click();}

let _booted=false;
function bootApp(){
  if(_booted)return;_booted=true;
  renderToday();renderJim();pomUI();initQuote();renderWeekStrip();updateProg();loadTodayAuto();
}
async function doLogin(){
  const inp=document.getElementById('auth-input'),btn=document.getElementById('auth-btn'),errEl=document.getElementById('auth-err');
  const pw=inp.value;
  if(!pw){errEl.textContent='Enter password';return;}
  btn.disabled=true;errEl.textContent='Checking...';
  try{
    const res=await fetch(AS_URL+'?action=login&pw='+encodeURIComponent(pw));
    const data=await res.json();
    if(data.success&&data.authorized){
      AUTH_PW=pw;localStorage.setItem('auth_pw',pw);
      document.getElementById('auth-gate').style.display='none';
      bootApp();
    }else{errEl.textContent='Wrong password';btn.disabled=false;}
  }catch(e){errEl.textContent='Connection error — try again';btn.disabled=false;}
}
function logout(){localStorage.removeItem('auth_pw');AUTH_PW='';location.reload();}
async function initAuth(){
  if(AUTH_PW){
    try{
      const res=await fetch(AS_URL+'?action=login&pw='+encodeURIComponent(AUTH_PW));
      const data=await res.json();
      if(data.success&&data.authorized){document.getElementById('auth-gate').style.display='none';bootApp();return;}
      localStorage.removeItem('auth_pw');AUTH_PW='';
    }catch(e){
      // Mất mạng: vẫn cho dùng offline bằng token đã lưu (server vẫn chặn ghi/đọc nếu sai)
      document.getElementById('auth-gate').style.display='none';bootApp();return;
    }
  }
  setTimeout(()=>{const i=document.getElementById('auth-input');if(i)i.focus();},120);
}
initAuth();
document.addEventListener('click',()=>{const m=document.getElementById('idea-cpick-menu');if(m)m.classList.remove('open');});
